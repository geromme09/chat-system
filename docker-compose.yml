services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    environment:
      POSTGRES_DB: chat_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chat_system_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chat_system"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: docker/migrate/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: chat_system
      DB_USER: postgres
      DB_PASSWORD: postgres
      GOOSE_DRIVER: postgres
      GOOSE_MIGRATION_DIR: /app/migrations
      GOOSE_DBSTRING: postgres://postgres:postgres@postgres:5432/chat_system?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - chat_system_network
    volumes:
      - ./migrations:/app/migrations
    command: ["up"]

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    environment:
      APP_ENV: dev
      HTTP_ADDR: :8080
      LOG_BODY_MAX_BYTES: 4096
      SQL_SLOW_THRESHOLD_MS: 200
      TOKEN_SECRET: change-me
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/chat_system?sslmode=disable
      POSTGRES_MAX_OPEN_CONNS: 25
      POSTGRES_MAX_IDLE_CONNS: 10
      POSTGRES_CONN_MAX_IDLE_MINUTES: 15
      POSTGRES_CONN_MAX_LIFETIME_MINUTES: 60
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      REDIS_POOL_SIZE: 10
      REDIS_MIN_IDLE_CONNS: 2
      RATE_LIMIT_REQUESTS_PER_SECOND: 5
      RATE_LIMIT_BURST: 15
      STORAGE_BASE_URL: https://cdn.example.com
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - chat_system_network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - chat_system_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1"]
    networks:
      - chat_system_network

volumes:
  postgres_data:

networks:
  chat_system_network:
    driver: bridge
