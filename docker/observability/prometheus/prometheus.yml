global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: chat-system-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]

  - job_name: jaeger
    static_configs:
      - targets: ["jaeger:14269"]
