        type: array
    required:
    - participant_ids
    type: object
  app.CreatePostInput:
    properties:
      caption:
        type: string
      image_data_url:
        type: string
    required:
    - caption
    type: object
  app.LoginInput:
    properties:
      identifier:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - identifier
    - password
    type: object
  app.ReportPostInput:
    properties:
      reason:
        type: string
    type: object
  app.SendFriendRequestInput:
    properties:
      target_user_id:
        type: string
    type: object
  app.SendMessageInput:
    properties:
      body:
        type: string
    required:
    - body
    type: object
  app.SignUpInput:
    properties:
      avatar_file_name:
        type: string
      bio:
        type: string
      city:
        type: string
      country:
        type: string
      display_name:
        type: string
      email:
        type: string
      password:
        minLength: 8
        type: string
      username:
        type: string
    required:
    - display_name
    - email
    - password
    - username
    type: object
  app.UpdatePostInput:
    properties:
      caption:
        type: string
    type: object
  app.UpdateProfileInput:
    properties:
      avatar_file_name:
        type: string
      bio:
        type: string
      city:
        type: string
      country:
        type: string
      display_name:
        type: string
      gender:
        type: string
      hobbies_text:
        type: string
      visible:
        type: boolean
    required:
    - display_name
    type: object
  response.ApiResponse:
    properties:
      data: {}
      error:
        $ref: '#/definitions/response.ErrorBody'
      message:
        type: string
      total_count:
        type: integer
    type: object
  response.ErrorBody:
    properties:
      message:
        type: string
    type: object
