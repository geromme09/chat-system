definitions:
  app.CreateConversationInput:
    properties:
      participant_ids:
        items:
          type: string
        type: array
    type: object
  app.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  app.SignUpInput:
    properties:
      avatar_file_name:
        type: string
      bio:
        type: string
      city:
        type: string
      country:
        type: string
      display_name:
        type: string
      email:
        type: string
      password:
        type: string
    type: object
  app.UpdateProfileInput:
    properties:
      avatar_file_name:
        type: string
      bio:
        type: string
      city:
        type: string
      country:
        type: string
      display_name:
        type: string
      skill_level:
        type: string
      sports:
        items:
          type: string
        type: array
      visible:
        type: boolean
    type: object
  response.ApiResponse:
    properties:
      data: {}
      error:
        $ref: '#/definitions/response.ErrorBody'
      message:
        type: string
      total_count:
        type: integer
    type: object
  response.ErrorBody:
    properties:
      message:
        type: string
    type: object
info:
  contact: {}
  description: Mobile-first sports social app backend API.
  title: Chat System API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ApiResponse'
      summary: Log in
      tags:
      - auth
  /api/v1/auth/signup:
    post:
      consumes:
      - application/json
      parameters:
      - description: Sign up payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app.SignUpInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ApiResponse'
      summary: Sign up
      tags:
      - auth
  /api/v1/chat/conversations:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ApiResponse'
      summary: List conversations
      tags:
      - chat
    post:
      consumes:
      - application/json
      parameters:
      - description: Conversation payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app.CreateConversationInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ApiResponse'
      summary: Create conversation
      tags:
      - chat
  /api/v1/chat/conversations/{id}/messages:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/response.ApiResponse'
      summary: List or send conversation messages
      tags:
      - chat
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/response.ApiResponse'
      summary: List or send conversation messages
      tags:
      - chat
  /api/v1/profile/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ApiResponse'
      summary: Get my profile
      tags:
      - profile
    put:
      consumes:
      - application/json
      parameters:
      - description: Profile payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app.UpdateProfileInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ApiResponse'
      summary: Update my profile
      tags:
      - profile
  /api/v1/sports:
    get:
      parameters:
      - description: Search query
        in: query
        name: q
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ApiResponse'
      summary: List sports
      tags:
      - sports
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
